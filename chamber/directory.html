    <meta property="og:title" content="Gilbert Chamber of Commerce">
    <meta property="og:type" content="website">
    <meta property="og:description" content="Supporting local businesses and strengthening our community.">
    <meta property="og:image" content="images/logo.webp">
    <meta property="og:url" content="https://wildw00f.github.io/wdd231/chamber/directory.html">

    <link rel="stylesheet" href="styles/normalize.css">

<body>

    <header>

        <div class="logo-container">
            <img src="images/logo.webp" alt="Gilbert Chamber Logo" width="60" height="60">
            <div>
                <h1>Gilbert</h1>
                <p>Chamber of Commerce</p>
            </div>
        </div>

        <button id="menuBtn" aria-label="Open Navigation">
            ☰
        </button>

        <nav id="primaryNav">
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="discover.html">Discover</a></li>
                <li><a href="directory.html" class="active">Directory</a></li>
                <li><a href="join.html">Join</a></li>
            </ul>
        </nav>

    </header>

    <main>

        <h2>Business Directory</h2>

        <div class="directory-controls">
            <button id="gridBtn">Grid</button>

        <section id="members" class="grid">

        </section>

    <footer>

            <p>123 Main Street</p>

            <p>Gilbert, ST 12345</p>

                <a href="mailto:info@gilbertchamber.org">

        <section class="footer-social">

            <a href="#" aria-label="Facebook">

                <img src="images/instagram.svg" alt="Instagram" width="40" height="40">
            </a>

            <a href="#" aria-label="LinkedIn">

            </a>

        </section>

        <section class="footer-info">

            <p>
                &copy; <span id="currentYear"></span>
                Thomas Dettmar | WDD 231
            </p>

            <p id="lastModified"></p>

        </section>

    <script src="scripts/navigation.js" defer></script>
