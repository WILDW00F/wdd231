<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Gilbert Chamber of Commerce | Directory</title>

    <meta name="description"
        content="Browse the official business directory for the Gilbert Chamber of Commerce. Find local businesses, organizations, and member information.">
    <meta name="author" content="Thomas Dettmar">

    <link rel="icon" href="favicon.ico">

    <meta property="og:title" content="Gilbert Chamber of Commerce Business Directory">
    <meta property="og:type" content="website">
    <meta property="og:description"
        content="Explore Gilbert Chamber of Commerce member businesses, discover local services, and connect with organizations that strengthen our community.">
    <meta property="og:image" content="https://wildw00f.github.io/wdd231/chamber/images/logo.webp">
    <meta property="og:url" content="https://wildw00f.github.io/wdd231/chamber/directory.html">

    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link
        href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&family=Merriweather:wght@700&display=swap"
        rel="stylesheet">

    <link rel="stylesheet" href="styles/normalize.css">
    <link rel="stylesheet" href="styles/small.css">
    <link rel="stylesheet" href="styles/larger.css">

    <script src="scripts/navigation.js" defer></script>
    <script src="scripts/directory.js" defer></script>
    <script src="scripts/footer.js" defer></script>

</head>

<body>

    <header>

        <div class="logo-container">

            <img src="images/logo.webp" alt="Gilbert Chamber of Commerce Logo" width="60" height="60">

            <div>
                <p class="site-name">Gilbert</p>
                <p>Chamber of Commerce</p>
            </div>

        </div>

        <button id="menuBtn" aria-label="Toggle navigation menu" aria-expanded="false" aria-controls="primaryNav">
            ☰
        </button>

        <nav id="primaryNav">
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="discover.html">Discover</a></li>
                <li><a href="directory.html" class="active" aria-current="page">Directory</a></li>
                <li><a href="join.html">Join</a></li>
            </ul>
        </nav>

    </header>

    <main>

        <h1>Gilbert Chamber of Commerce Directory</h1>

        <div class="directory-controls">
            <button id="gridBtn" type="button">Grid View</button>
            <button id="listBtn" type="button">List View</button>
        </div>

        <section id="members" class="grid">

        </section>

    </main>

    <footer>

        <section class="footer-contact">

            <p class="footer-title">Gilbert Chamber of Commerce</p>

            <p>123 Main Street</p>

            <p>Gilbert, ST 12345</p>

            <p>
                <a href="mailto:info@gilbertchamber.org">
                    info@gilbertchamber.org
                </a>
            </p>

            <p>(555) 555-1234</p>

        </section>

        <section class="footer-social">

            <a href="#" aria-label="Facebook">
                <img src="images/facebook.svg" alt="Visit our Facebook page" width="40" height="40">
            </a>

            <a href="#" aria-label="Instagram">
                <img src="images/instagram.svg" alt="Visit our Instagram page" width="40" height="40">
            </a>

            <a href="#" aria-label="LinkedIn">
                <img src="images/linkedin.svg" alt="Visit our LinkedIn page" width="40" height="40">
            </a>

        </section>

        <section class="footer-info">

            <p>
                &copy; <span id="currentYear"></span>
                Thomas Dettmar | WDD 231
            </p>

            <p id="lastModified"></p>

        </section>

    </footer>

</body>

</html>
